id: spacetraders
name: SpaceTraders
version: 1.0.0
description: >-
  Play the live SpaceTraders v2 API (https://spacetraders.io) — a persistent,
  shared galactic economy. A FULL-BUNDLE plugin (ADR 0027): 30 fleet/market/mining/
  contract tools, a navigator/trader/miner/fleet-commander crew, a background fleet
  autopilot, the procurement-run / mining-run / fleet-bootstrap workflows, gameplay
  skills, a console Fleet dashboard, and a seedable lessons KB. Set your token in
  System → Settings → SpaceTraders, then tell the agent to grow the treasury.
# Provenance (ADR 0027) — shown in the install review when added by git URL.
repository: "https://github.com/protoLabsAI/spacetraders-plugin"
homepage: "https://spacetraders.io"
min_protoagent_version: "0.20.0"   # needs ADR 0026 views + ADR 0027 bundle discovery
requires_pip: []                   # pure Python over httpx (a core dependency)
enabled: true
requires_env: []
# Config + secrets + Settings (ADR 0019) — a new user pastes their token in the
# console: System → Settings → SpaceTraders. The agent token (per reset) is the
# only thing needed to play; the account token is optional, for registering a new
# agent. Secrets are stored in secrets.yaml; the plugin reads them at graph build.
config_section: spacetraders
config:
  call_sign: ""
  faction: "COSMIC"
secrets: [token, account_token]
settings:
  - { key: token, label: "Agent token", type: secret, group: "SpaceTraders", description: "Your SpaceTraders AGENT token (lets the agent play). Get it by registering an agent at spacetraders.io, or it's filled in automatically after the agent registers one. Per-reset — re-paste after a universe wipe." }
  - { key: account_token, label: "Account token", type: secret, group: "SpaceTraders", description: "Optional. Your spacetraders.io ACCOUNT token — only needed to register a brand-new agent (the agent uses st_register with this). Not needed if you already have an agent token above." }
  - { key: call_sign, label: "Call sign", type: string, group: "SpaceTraders", description: "Optional. The agent call sign to register (3–14 chars, A–Z/0–9/_/-), e.g. PROTOTRADERS. Used only when registering a new agent." }
  - { key: faction, label: "Starting faction", type: string, group: "SpaceTraders", description: "Optional. Starting faction for a new agent: COSMIC (default), GALACTIC, QUANTUM, DOMINION, ASTRO." }
# Console view (ADR 0026) — a left-rail "Fleet" icon opens a live dashboard
# (credits, ships, contracts, the autopilot) served at the path below.
views:
  - { id: fleet, label: "Fleet", icon: "LayoutDashboard", path: "/plugins/spacetraders/dashboard" }
